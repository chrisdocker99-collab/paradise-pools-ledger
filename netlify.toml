[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/quotes"
  to = "/.netlify/functions/quotes"
  status = 200

[[redirects]]
  from = "/api/data/*"
  to = "/.netlify/functions/data/:splat"
  status = 200

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200
